name: Playwright Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      test_marker:
        description: "Pytest marker to run (ui, api, or blank for all)"
        required: false
        default: ""

env:
  PYTHON_VERSION: "3.12"
  ENV: "dev"

jobs:
  ui-tests:
    name: UI Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run UI tests (shard ${{ matrix.shard }}/4)
        run: |
          pytest tests/ui \
            -m ui \
            -n auto \
            --dist=loadscope \
            --splits 4 --group ${{ matrix.shard }} \
            --html=reports/html/ui-report-${{ matrix.shard }}.html \
            --self-contained-html \
            --junitxml=reports/junit/ui-results-${{ matrix.shard }}.xml
        continue-on-error: false

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-html-report-shard-${{ matrix.shard }}
          path: reports/html/
          retention-days: 14

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-junit-results-shard-${{ matrix.shard }}
          path: reports/junit/
          retention-days: 14

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots-shard-${{ matrix.shard }}
          path: screenshots/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-traces-shard-${{ matrix.shard }}
          path: reports/traces/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload failed-test videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-videos-shard-${{ matrix.shard }}
          path: reports/videos/
          retention-days: 14
          if-no-files-found: ignore

  api-tests:
    name: API Tests (Requests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: |
          pytest tests/api \
            -m api \
            -n auto \
            --html=reports/html/api-report.html \
            --self-contained-html \
            --junitxml=reports/junit/api-results.xml

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-html-report
          path: reports/html/
          retention-days: 14

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-junit-results
          path: reports/junit/
          retention-days: 14